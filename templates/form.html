<!DOCTYPE html>
<html>
<head>
    <title>Customer Data Form</title>
</head>
<body>

    <h2>Enter Customer Details</h2>

    <form action="{{ url_for('prediction') }}" method="post">

        <label>Gender:</label>
        <select name="gender">
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select><br><br>

        <label>Senior Citizen:</label>
        <select name="SeniorCitizen">
            <option value="0">No</option>
            <option value="1">Yes</option>
        </select><br><br>

        <label>Partner:</label>
        <select name="Partner">
            <option>No</option>
            <option>Yes</option>
        </select><br><br>

        <label>Dependents:</label>
        <select name="Dependents">
            <option>No</option>
            <option>Yes</option>
        </select><br><br>

        <label>Tenure:</label>
        <input type="number" name="tenure"><br><br>

        <label>Phone Service:</label>
        <select name="PhoneService">
            <option>No</option>
            <option>Yes</option>
        </select><br><br>

        <label>Multiple Lines:</label>
        <select name="MultipleLines">
            <option>No</option>
            <option>Yes</option>
            <option>No phone service</option>
        </select><br><br>

        <label>Internet Service:</label>
        <select name="InternetService">
            <option>DSL</option>
            <option>Fiber optic</option>
            <option>No</option>
        </select><br><br>

        <label>Online Security:</label>
        <select name="OnlineSecurity">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Online Backup:</label>
        <select name="OnlineBackup">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Device Protection:</label>
        <select name="DeviceProtection">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Tech Support:</label>
        <select name="TechSupport">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Streaming TV:</label>
        <select name="StreamingTV">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Streaming Movies:</label>
        <select name="StreamingMovies">
            <option>No</option>
            <option>Yes</option>
            <option>No internet service</option>
        </select><br><br>

        <label>Contract:</label>
        <select name="Contract">
            <option>Month-to-month</option>
            <option>One year</option>
            <option>Two year</option>
        </select><br><br>

        <label>Paperless Billing:</label>
        <select name="PaperlessBilling">
            <option>Yes</option>
            <option>No</option>
        </select><br><br>

        <label>Payment Method:</label>
        <select name="PaymentMethod">
            <option>Electronic check</option>
            <option>Mailed check</option>
            <option>Bank transfer (automatic)</option>
            <option>Credit card (automatic)</option>
        </select><br><br>

        <label>Monthly Charges:</label>
        <input type="number" step="0.01" name="MonthlyCharges"><br><br>

        <label>Total Charges:</label>
        <input type="number" step="0.01" name="TotalCharges"><br><br>

        <button type="submit">Submit</button>
        {% if result is defined and result is not none %}

        <h3>The predicted churn is: {{ result }}</h3>

        {% endif %}

    </form>

</body>
</html>
